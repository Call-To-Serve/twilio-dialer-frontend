<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialer System</title>
    
    <!-- Alternative jsDelivr Mirror Network Route -->
    <script src="https://cdn.jsdelivr.net/npm/twilio-client@1.14.0/dist/twilio.min.js"></script>
    
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .title { color: #d4af37; font-size: 24px; font-weight: bold; letter-spacing: 1px; margin-bottom: 20px; }
        .error-box { color: #ffb74d; font-size: 14px; background: #221a10; border: 1px solid #ffb74d; padding: 15px; border-radius: 6px; margin: 20px auto; max-width: 400px; line-height: 1.5; word-wrap: break-word; }
        .input-box { width: 100%; max-width: 380px; background: #222; border: 1px solid #333; color: #fff; font-size: 28px; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .btn { width: 100%; max-width: 410px; background: #2ecc71; border: none; color: white; font-size: 20px; font-weight: bold; padding: 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="title">DIALER SYSTEM</div>
    <div id="status-display" class="error-box">Initializing Gateway Interface...</div>

    <input type="text" id="phone-input" class="input-box" value="+1">
    <button id="call-btn" class="btn">Start Call</button>

    <script>
        const statusDisplay = document.getElementById('status-display');
        const callBtn = document.getElementById('call-btn');
        const phoneInput = document.getElementById('phone-input');
        let isReady = false;

        async function initDevice() {
            try {
                if (typeof Twilio === 'undefined') {
                    statusDisplay.innerText = "Initialization Failed.\nReason: All library CDNs are blocked by your local internet provider. Please turn on a VPN connection on your mobile device and refresh.";
                    return;
                }

                statusDisplay.innerText = "Fetching security token from backend...";

                const response = await fetch('https://twilio-dialer-backend.vercel.app/api/token', {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    statusDisplay.innerText = `Initialization Failed.\nServer status code: ${response.status}`;
                    return;
                }

                const rawData = await response.text();
                const data = JSON.parse(rawData);

                if (!data.token) {
                    statusDisplay.innerText = "Initialization Failed.\nReason: Active token field missing from backend.";
                    return;
                }

                statusDisplay.innerText = "Connecting to Twilio voice engine...";

                Twilio.Device.setup(data.token, {
                    edge: 'ashburn',
                    closeProtection: true
                });

                Twilio.Device.ready(() => {
                    isReady = true;
                    statusDisplay.style.borderColor = "#2ecc71";
                    statusDisplay.style.color = "#2ecc71";
                    statusDisplay.style.background = "#14251c";
                    statusDisplay.innerText = "Ready to Cold Call. System fully armed.";
                });

                Twilio.Device.error((twilioError) => {
                    statusDisplay.innerText = `Twilio Gateway Error: ${twilioError.message}`;
                });

            } catch (err) {
                console.error(err);
                statusDisplay.innerText = `Initialization Failed.\nReason: ${err.message}`;
            }
        }

        callBtn.addEventListener('click', () => {
            if (!isReady) return;
            const targetNumber = phoneInput.value.trim();
            statusDisplay.innerText = `Dialing connection out to ${targetNumber}...`;
            Twilio.Device.connect({ To: targetNumber });
        });

        window.addEventListener('DOMContentLoaded', initDevice);
    </script>
</body>
</html>
