<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialer System</title>
    
    <!-- Using a completely neutral, high-speed open mirror to bypass your network block -->
    <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.12.3/dist/twilio.min.js"></script>
    
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .title { color: #d4af37; font-size: 24px; font-weight: bold; letter-spacing: 1px; margin-bottom: 20px; }
        .error-box { color: #ffb74d; font-size: 14px; background: #221a10; border: 1px solid #ffb74d; padding: 15px; border-radius: 6px; margin: 20px auto; max-width: 400px; line-height: 1.5; }
        .input-box { width: 100%; max-width: 380px; background: #222; border: 1px solid #333; color: #fff; font-size: 28px; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .btn { width: 100%; max-width: 410px; background: #2ecc71; border: none; color: white; font-size: 20px; font-weight: bold; padding: 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="title">DIALER SYSTEM</div>
    <div id="status-display" class="error-box">Initializing Gateway Interface...</div>

    <input type="text" id="phone-input" class="input-box" value="+1">
    <button id="call-btn" class="btn">Start Call</button>

    <script>
        const statusDisplay = document.getElementById('status-display');
        const callBtn = document.getElementById('call-btn');
        const phoneInput = document.getElementById('phone-input');
        let device = null;

        async function initDevice() {
            try {
                // Verify if the library successfully loaded past the ISP filter
                if (typeof Twilio === 'undefined') {
                    statusDisplay.innerText = "Network Block: Your mobile provider is completely blocking the Twilio script connection. Try turning on a VPN app or switching from Mobile Data to a Wi-Fi connection.";
                    return;
                }

                // Replace your current fetch line with this exact URL:
const response = await fetch('https://twilio-dialer-backend-jo98m8asv-ansaar9293525-4392s-projects.vercel.app/api/token');


                const data = await response.json();

                if (!data.token) {
                    statusDisplay.innerText = "Error: Backend failed to supply an authorization token.";
                    return;
                }

                // Initialize Device Connection
                device = new Twilio.Device(data.token, {
                    edge: 'ashburn',
                    closeProtection: true
                });

                await device.register();

                device.on('registered', () => {
                    statusDisplay.style.borderColor = "#2ecc71";
                    statusDisplay.style.color = "#2ecc71";
                    statusDisplay.style.background = "#14251c";
                    statusDisplay.innerText = "Ready to Cold Call. System fully armed.";
                });

                device.on('error', (twilioError) => {
                    statusDisplay.innerText = `Twilio Gateway Refusal (Code: ${twilioError.code})\nDetail: ${twilioError.description || twilioError.message}`;
                });

            } catch (err) {
                statusDisplay.innerText = `Device Initialize Error: ${err.message}`;
            }
        }

        callBtn.addEventListener('click', async () => {
            if (!device) return;
            const targetNumber = phoneInput.value.trim();
            if (device.state === 'registered') {
                statusDisplay.innerText = `Dialing connection out to ${targetNumber}...`;
                await device.connect({ params: { To: targetNumber } });
            }
        });

        window.addEventListener('DOMContentLoaded', initDevice);
    </script>
</body>
</html>
