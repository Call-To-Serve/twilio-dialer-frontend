<script>
    let device;
    let activeConnection = null;
    const TOKEN_URL = "https://twilio-dialer-backend.vercel.app/api/token";

    function updateStatus(msg) {
        document.getElementById('status').innerText = msg;
    }

    async function initDevice() {
        try {
            updateStatus("Step 1: Fetching token from backend...");
            const response = await fetch(TOKEN_URL);
            
            updateStatus("Step 2: Parsing token data...");
            const data = await response.json();
            
            if (!data.token) {
                updateStatus("Error: Backend did not return a token string.");
                return;
            }

            updateStatus("Step 3: Initializing Twilio Device structure...");
            device = new Twilio.Device(data.token, {
                logLevel: 1,
                edge: 'ashburn'
            });

            device.on('registered', () => {
                updateStatus("Ready to Cold Call");
            });

            device.on('error', (error) => {
                updateStatus("Twilio Device Error: " + error.message);
            });

            updateStatus("Step 4: Registering with Twilio network...");
            await device.register();

        } catch (err) {
            updateStatus("JavaScript Catch Error: " + err.message);
        }
    }

    async function makeCall() {
        const toNumber = document.getElementById('phone-number').value;
        if (!device) return alert('Dialer system not ready yet.');
        updateStatus("Dialing " + toNumber + "...");
        activeConnection = await device.connect({ params: { To: toNumber } });
        activeConnection.on('accept', () => {
            updateStatus("Call Connected");
            document.getElementById('btn-call').style.display = 'none';
            document.getElementById('btn-hangup').style.display = 'block';
        });
        activeConnection.on('disconnect', () => { resetUI(); });
    }

    function hangUp() {
        if (activeConnection) { activeConnection.disconnect(); }
        resetUI();
    }

    function resetUI() {
        updateStatus("Call Ended / Ready");
        document.getElementById('btn-call').style.display = 'block';
        document.getElementById('btn-hangup').style.display = 'none';
        activeConnection = null;
    }

    // Run automatically on load
    initDevice();
</script>
